name: Deploy to GitHub Pages

# Publishes a live, static preview of the popup to GitHub Pages from the default
# branch. The popup runs against a lightweight chrome.* shim (js/chrome-shim.js)
# when it is not loaded as an extension, and shows the build version in the footer.
#
# Requires "Pages" to be enabled with the source set to "GitHub Actions"
# (Settings → Pages → Build and deployment → Source: GitHub Actions).

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate version metadata
        run: npm run gen:version

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -r main.html sandbox.html icon.png manifest.json js css bs images _locales _site/
          cp main.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
