name: Coverage report

# Posts a Jest coverage summary as a comment on every pull request and enforces the
# thresholds declared in jest.config.js (see the coverageThreshold block).

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  coverage:
    name: Jest coverage comment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Jest coverage report
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          package-manager: npm
          skip-step: install
